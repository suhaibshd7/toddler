<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000820">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="favicon.ico">

<title>🎹 Toddler Keyboard</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#000820; font-family:system-ui,sans-serif; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }

/* ── STAGE ── */
#stage {
  width:100vw; height:100vh; position:relative;
  background:radial-gradient(ellipse at 50% 60%, #1a0040 0%, #000820 70%);
  overflow:hidden; outline:none;
}

/* ── START OVERLAY ── */
#fs-overlay {
  position:fixed; inset:0; z-index:10000; background:#000820;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; color:#fff; text-align:center; padding:30px;
}
#fs-overlay .icon { font-size:80px; }
#fs-overlay .msg  { font-size:22px; font-weight:700; max-width:320px; line-height:1.4; }
#fs-overlay .sub  { font-size:14px; opacity:0.5; max-width:280px; line-height:1.5; }
#fs-btn {
  margin-top:8px; padding:16px 44px; border-radius:30px;
  background:linear-gradient(135deg,#A29BFE,#FD79A8);
  border:none; color:#fff; font-size:20px; font-weight:800;
  cursor:pointer; box-shadow:0 8px 30px rgba(162,155,254,0.4);
}

/* ── EXIT BUTTON (hold 2s) ── */
#exit-btn {
  position:fixed; top:14px; right:14px; z-index:9999;
  width:52px; height:52px; border-radius:50%;
  background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.25);
  color:#fff; font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#exit-btn .ring {
  position:absolute; inset:-3px; border-radius:50%;
  border:3px solid transparent; border-top-color:#fff; animation:none;
}
#exit-btn.holding .ring { animation:holdSpin 2s linear forwards; }
@keyframes holdSpin { to { transform:rotate(360deg); border-color:#fff; } }
#hold-hint { position:fixed; top:74px; right:8px; z-index:9999; font-size:11px; color:rgba(255,255,255,0.35); white-space:nowrap; pointer-events:none; }

/* ── CONTENT MANAGER MODAL ── */
#cm-btn {
  position:fixed; top:14px; left:14px; z-index:9999;
  width:52px; height:52px; border-radius:50%;
  background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.25);
  color:#fff; font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#cm-modal {
  position:fixed; inset:0; z-index:20000; background:rgba(0,0,0,0.85);
  display:none; align-items:center; justify-content:center; padding:16px;
}
#cm-modal.open { display:flex; }
#cm-box {
  background:#1a1a2e; border:2px solid rgba(255,255,255,0.15); border-radius:24px;
  width:100%; max-width:540px; max-height:90vh; overflow-y:auto;
  padding:20px; display:flex; flex-direction:column; gap:16px;
  color:#fff; font-family:system-ui,sans-serif;
}
#cm-box h2 { font-size:20px; font-weight:800; text-align:center; margin:0; }
.cm-section { background:rgba(255,255,255,0.05); border-radius:16px; padding:14px; }
.cm-section-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px;
}
.cm-section-title { font-size:15px; font-weight:700; }
.cm-toggle {
  width:44px; height:24px; border-radius:12px; border:none; cursor:pointer;
  position:relative; transition:background 0.2s; flex-shrink:0;
  background:#555;
}
.cm-toggle.on { background:#6BCB77; }
.cm-toggle::after {
  content:''; position:absolute; top:3px; left:3px;
  width:18px; height:18px; border-radius:50%; background:#fff;
  transition:transform 0.2s;
}
.cm-toggle.on::after { transform:translateX(20px); }
.cm-weight-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.cm-weight-row label { font-size:12px; opacity:0.7; white-space:nowrap; }
.cm-weight-row input[type=range] { flex:1; accent-color:#A29BFE; }
.cm-weight-val { font-size:13px; font-weight:700; min-width:24px; text-align:right; color:#A29BFE; }
.cm-items { display:flex; flex-wrap:wrap; gap:6px; }
.cm-item {
  display:flex; align-items:center; gap:4px;
  background:rgba(255,255,255,0.08); border-radius:10px;
  padding:4px 8px; font-size:20px; cursor:pointer; border:2px solid transparent;
  transition:border-color 0.15s, opacity 0.15s;
}
.cm-item.off { opacity:0.3; border-color:rgba(255,80,80,0.5); }
.cm-item .cm-del { font-size:11px; opacity:0.5; margin-left:2px; }
.cm-item:hover .cm-del { opacity:1; color:#FF6B6B; }
.cm-add-row { display:flex; gap:8px; margin-top:10px; }
.cm-add-row input {
  flex:1; background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2);
  border-radius:10px; color:#fff; font-size:18px; padding:6px 10px; outline:none;
}
.cm-add-row button {
  padding:6px 14px; border-radius:10px; border:none;
  background:linear-gradient(135deg,#A29BFE,#FD79A8);
  color:#fff; font-size:14px; font-weight:700; cursor:pointer;
}
#cm-close {
  padding:10px; border-radius:14px; border:none;
  background:rgba(255,255,255,0.1); color:#fff;
  font-size:15px; font-weight:700; cursor:pointer; margin-top:4px;
}
#cm-close:hover { background:rgba(255,255,255,0.2); }

/* ── SOUND PANEL (faded, parent-facing) ── */
#sound-panel {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:6px; z-index:9999;
  opacity:0.2; transition:opacity 0.3s;
}
#sound-panel:hover { opacity:1; }
#sound-panel .panel-label {
  color:rgba(255,255,255,0.6); font-size:10px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
}
#sound-panel .panel-buttons { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
#sound-panel button {
  padding:6px 13px; border-radius:20px; border:2px solid rgba(255,255,255,0.3);
  background:rgba(0,0,0,0.5); color:#fff; font-size:12px; font-weight:700; cursor:pointer;
}
#sound-panel button.active { background:rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.8); }

/* ── CARDS & FX ── */
.card { position:absolute; pointer-events:none; display:flex; align-items:center; justify-content:center; border-radius:32px; animation:popIn 0.32s cubic-bezier(0.17,0.89,0.32,1.49) forwards; }
@keyframes popIn { 0%{transform:scale(0) rotate(-15deg);opacity:0} 65%{transform:scale(1.35) rotate(5deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
.card .em { font-size:min(22vw,140px); line-height:1; filter:drop-shadow(0 8px 24px rgba(0,0,0,0.7)); }
.fadeout { animation:fadeOut 2s ease-out forwards; }
@keyframes fadeOut { 0%{opacity:1;transform:scale(1) translateY(0)} 35%{opacity:1;transform:scale(1.1) translateY(-20px)} 100%{opacity:0;transform:scale(0.3) translateY(-100px)} }
.ring { position:absolute; pointer-events:none; border-radius:50%; animation:ringOut 0.9s ease-out forwards; }
@keyframes ringOut { 0%{transform:scale(0.1);opacity:0.9} 100%{transform:scale(5);opacity:0} }
.dot { position:absolute; pointer-events:none; animation:dotFly ease-out forwards; }
@keyframes dotFly { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }
.musym { position:absolute; pointer-events:none; font-weight:900; animation:muFly 1.6s ease-out forwards; }
@keyframes muFly { 0%{transform:scale(0.3) translateY(0) rotate(-10deg);opacity:1} 35%{transform:scale(1.4) translateY(-25px) rotate(8deg);opacity:1} 100%{transform:scale(0.6) translateY(-110px) rotate(-5deg);opacity:0} }
.flash { position:absolute; inset:0; pointer-events:none; animation:flashOut 0.45s ease-out forwards; }
@keyframes flashOut { 0%{opacity:0.25} 100%{opacity:0} }
</style>

'use strict';

// ── FULLSCREEN ──────────────────────────────────────────────────────────────
const fsOverlay = document.getElementById('fs-overlay');
document.getElementById('fs-btn').addEventListener('click', () => {
  // Try fullscreen (works on Android Chrome; iOS Safari blocks it — that's OK)
  const el = document.documentElement;
  try {
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen||function(){}).call(el).catch(()=>{});
  } catch(e) {}
  fsOverlay.style.display = 'none';
  stage.focus();
  // ── CRITICAL: unlock Web Audio on iOS — must happen synchronously inside user gesture ──
  initAudio();
  // iOS needs a silent buffer played to fully unlock AudioContext
  try {
    const c = actx;
    const buf = c.createBuffer(1, 1, c.sampleRate);
    const src = c.createBufferSource();
    src.buffer = buf;
    src.connect(c.destination);
    src.start(0);
  } catch(e) {}
  preloadSounds();
  // Play a random greeting when the game starts
  setTimeout(() => playGreeting(), 600);
});

// Re-enter fullscreen if accidentally exited (only on non-iOS where fullscreen works)
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
if (!isIOS) {
  ['fullscreenchange','webkitfullscreenchange'].forEach(ev =>
    document.addEventListener(ev, () => {
      if (!document.fullscreenElement && !document.webkitFullscreenElement && fsOverlay.style.display==='none')
        setTimeout(()=>(document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen||function(){}).call(document.documentElement).catch(()=>{}), 600);
    })
  );
}

// ── KEY BLOCKING ────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const blocked = ['Tab','Escape','F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12','Meta','OS','ContextMenu','PrintScreen','ScrollLock','Pause','Home','End','PageUp','PageDown','Alt','Control'];
  if (blocked.includes(e.key) || e.altKey || e.ctrlKey || e.metaKey) { e.preventDefault(); e.stopPropagation(); return false; }
  if (!e.repeat) {
    if (e.key === '6') { playGreeting(); return; }
    go(e.key);
  }
}, true);
document.addEventListener('contextmenu', e => e.preventDefault(), true);

// ── EXIT BUTTON ──────────────────────────────────────────────────────────────
const exitBtn = document.getElementById('exit-btn');
let holdTimer = null;
function startHold(){ exitBtn.classList.add('holding'); holdTimer=setTimeout(()=>{ (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document).catch(()=>{}); fsOverlay.style.display='flex'; },2000); }
function cancelHold(){ exitBtn.classList.remove('holding'); clearTimeout(holdTimer); }
exitBtn.addEventListener('mousedown', startHold);
exitBtn.addEventListener('touchstart', e=>{ e.stopPropagation(); startHold(); },{passive:true});
['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>exitBtn.addEventListener(ev,cancelHold));

// ── AUDIO CONTEXT ───────────────────────────────────────────────────────────
const AC = window.AudioContext||window.webkitAudioContext;
let actx=null;
function ctx(){ if(!actx) actx=new AC(); if(actx.state==='suspended') actx.resume(); return actx; }
function initAudio(){ ctx(); }

// ── IndexedDB audio cache — so each sound is only fetched once per device ────
const DB_NAME = 'toddler-sounds-v1';
let db = null;
async function openDB() {
  if (db) return db;
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('bufs');
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
async function getCached(key) {
  try {
    const d = await openDB();
    return new Promise((res, rej) => {
      const tx = d.transaction('bufs', 'readonly');
      const req = tx.objectStore('bufs').get(key);
      req.onsuccess = () => res(req.result || null);
      req.onerror = () => res(null);
    });
  } catch { return null; }
}
async function setCached(key, arrayBuf) {
  try {
    const d = await openDB();
    return new Promise((res) => {
      const tx = d.transaction('bufs', 'readwrite');
      tx.objectStore('bufs').put(arrayBuf, key);
      tx.oncomplete = () => res();
      tx.onerror = () => res();
    });
  } catch {}
}

const bufCache = {};

async function loadBuf(url) {
  if (bufCache[url]) return bufCache[url];
  // Try IndexedDB cache first — avoids re-fetching on repeat visits
  let arrayBuf = await getCached(url);
  if (!arrayBuf) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    arrayBuf = await r.arrayBuffer();
    setCached(url, arrayBuf.slice(0));
  }
  const buf = await ctx().decodeAudioData(arrayBuf);
  bufCache[url] = buf;
  return buf;
}

function playBuf(buf, vol=0.9) {
  const c=ctx(), src=c.createBufferSource(), g=c.createGain();
  src.buffer=buf; g.gain.value=vol; src.connect(g); g.connect(c.destination); src.start();
}

// Play instantly from cache — no awaiting, fire and forget
function tryPlayAnimal(soundKey) {
  const urls = SOUND_SOURCES[soundKey] || [];
  for (const url of urls) {
    if (bufCache[url]) { playBuf(bufCache[url]); return true; }
  }
  return false; // not cached yet, speech fallback will handle it
}

// ── LETTER JINGLE — bright marimba ding + spoken name ────────────────────────
const LETTER_NOTES = (()=>{
  const scale=[261.63,293.66,329.63,392,440,523.25,587.33,659.25,784,880,1046.5,1174.66];
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const map={};
  letters.split('').forEach((l,i)=>{ map[l]=scale[i%scale.length]*(i<12?1:2); });
  return map;
})();
function playLetterJingle(letter){
  const c=ctx(),n=c.currentTime,d=c.destination;
  const f=Math.min(LETTER_NOTES[letter]||440,1800);
  [[1,0.72,0.48,'triangle'],[2,0.2,0.24,'sine'],[3,0.08,0.15,'sine']].forEach(([r,v,dur,t])=>{
    const o=c.createOscillator(),g=c.createGain();
    o.type=t;o.frequency.value=Math.min(f*r,3500);
    g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(0.001,n+dur);
    o.connect(g);g.connect(d);o.start(n);o.stop(n+dur+0.05);
  });
  const pk=c.createOscillator(),pg=c.createGain();
  pk.type='triangle';pk.frequency.setValueAtTime(f*6,n);pk.frequency.exponentialRampToValueAtTime(f*0.8,n+0.03);
  pg.gain.setValueAtTime(0.48,n);pg.gain.exponentialRampToValueAtTime(0.001,n+0.04);
  pk.connect(pg);pg.connect(d);pk.start(n);pk.stop(n+0.05);
  // Musical accent — rising sparkle after the jingle
  setTimeout(()=>{
    const c=ctx(),n=c.currentTime,d=c.destination;
    [[0,f*2,f*4,0.07],[0.07,f*3,f*6,0.06],[0.13,f*4,f*8,0.05]].forEach(([t,f1,f2,dur])=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='sine';o.frequency.setValueAtTime(Math.min(f1,5000),n+t);
      o.frequency.exponentialRampToValueAtTime(Math.min(f2,6000),n+t+dur);
      g.gain.setValueAtTime(0.18,n+t);g.gain.exponentialRampToValueAtTime(0.001,n+t+dur+0.02);
      o.connect(g);g.connect(d);o.start(n+t);o.stop(n+t+dur+0.04);
    });
  },115);
}

function playXylophone(f){

// ── GUITAR — plucked string via Karplus-Strong inspired synthesis ─────────────
function playGuitar(f){
  const c=ctx(),n=c.currentTime,d=c.destination;
  const period=Math.round(c.sampleRate/f);
  const sz=c.sampleRate*1.2|0;
  const b=c.createBuffer(1,sz,c.sampleRate),da=b.getChannelData(0);
  // Seed with noise for one period
  for(let i=0;i<period;i++) da[i]=Math.random()*2-1;
  // Karplus-Strong: average adjacent samples (low-pass feedback loop)
  for(let i=period;i<sz;i++) da[i]=(da[i-period]+da[i-period+1])*0.498;
  // Envelope
  const src=c.createBufferSource(),g=c.createGain(),filt=c.createBiquadFilter();
  src.buffer=b; filt.type='lowpass'; filt.frequency.value=3500;
  g.gain.setValueAtTime(0.85,n); g.gain.exponentialRampToValueAtTime(0.001,n+1.1);
  src.connect(filt); filt.connect(g); g.connect(d); src.start(n);
}

// ── SCALES — every note always fits, no wrong notes ──────────────────────────
const SCALES = {
  pentatonic: [0,2,4,7,9],           // C D E G A — the "magic" scale, always happy
  nursery:    [0,2,4,5,7,9,11],      // C major — do re mi fa sol la ti
  jazz:       [0,2,3,5,7,9,10],      // Dorian mode — jazzy & cool
  blues:      [0,3,5,6,7,10],        // Blues scale — funky
  major:      [0,2,4,5,7,9,11],      // Same as nursery but higher register
  minor:      [0,2,3,5,7,8,10],      // Natural minor — dreamy
};

// Map a key-press index (0-25 for letters, etc.) to a musical frequency
// Always stays in the chosen scale — no clashing notes possible
let currentScale = 'pentatonic';
let _noteIndex = 0;   // walks up/down scale for consecutive presses (melodic feel)
let _noteDir = 1;
const BASE_FREQ = 261.63; // C4

function scaleFreq(keyChar) {
  const scale = SCALES[currentScale] || SCALES.pentatonic;
  // Use key char code to pick a scale degree consistently per key
  const code = keyChar ? keyChar.charCodeAt(0) : _noteIndex;
  const degree = code % scale.length;
  // Pick octave: spread across 3 octaves for range
  const octave = Math.floor(code / scale.length) % 3;
  const semitones = scale[degree] + octave * 12;
  return BASE_FREQ * Math.pow(2, semitones / 12);
}

function playFallback(f, skipScale) {

  if (!skipScale) f = scaleFreq(_lastFallbackKey||'C');

function rebuildPool(){
  POOL = [];
  groups.forEach(g=>{

    const active = g.items.filter(item=>!(g.disabled||[]).includes(item));

  });

  lastIdx=-1;
}

    });

    slider.addEventListener('input',function(){
      g.weight=+this.value; valEl.textContent=this.value+'x';

    });

    // Render item chips
    const itemsEl=sec.querySelector('.cm-items');
    function renderItems(){
      itemsEl.innerHTML='';
      g.items.forEach((item,ii)=>{
        const isOff=(g.disabled||[]).includes(item);
        const el=document.createElement('div');
        el.className='cm-item'+(isOff?' off':'');
        el.innerHTML=`<span class="cm-emoji">${item}</span><span class="cm-del">✕</span>`;
        // tap emoji = toggle active/inactive
        el.querySelector('.cm-emoji').addEventListener('click',()=>{
          if(!g.disabled) g.disabled=[];
          if(isOff){ g.disabled=g.disabled.filter(x=>x!==item); }
          else { g.disabled.push(item); }
          rebuildPool(); saveGroups(); renderItems();
        });
        // tap ✕ = remove from list
        el.querySelector('.cm-del').addEventListener('click',e=>{
          e.stopPropagation();
          g.items.splice(ii,1);
          g.disabled=(g.disabled||[]).filter(x=>x!==item);
          rebuildPool(); saveGroups(); renderItems();
        });
        itemsEl.appendChild(el);
      });
    }
    renderItems();

    // Add custom emoji
    if(g.id==='custom'){
      sec.querySelector('.cm-add-btn').addEventListener('click',()=>{
        const inp=sec.querySelector('.cm-add-input');

        const segs=[...new Intl.Segmenter('en',{granularity:'grapheme'}).segment(inp.value.trim())];
        const val=segs[0]?.segment||'';
        if(val&&!g.items.includes(val)){ g.items.push(val); rebuildPool(); saveGroups(); renderItems(); }
        inp.value='';
      });
    }

    box.insertBefore(sec,closeBtn);
  });
}

  [0,220].forEach((delay,ri)=>{ setTimeout(()=>{ const r=document.createElement('div'); r.className='ring'; r.style.cssText=`width:70px;height:70px;left:${x-35}px;top:${y-35}px;border:${ri===0?`5px solid ${col}`:`3px solid ${col}44`};`; stage.appendChild(r); setTimeout(()=>r.remove(),950); },delay); });
  for(let i=0;i<32;i++){ const d=document.createElement('div'); d.className='dot'; const sz=5+Math.random()*18,ang=(i/32)*Math.PI*2+Math.random()*0.5,dist=80+Math.random()*220,dur=0.45+Math.random()*0.75; const c2=COLS[Math.floor(Math.random()*COLS.length)]; if(Math.random()>0.5){ d.style.cssText=`left:${x}px;top:${y}px;font-size:${sz+4}px;background:none;border-radius:0;color:${c2};--tx:${Math.cos(ang)*dist}px;--ty:${Math.sin(ang)*dist-50}px;animation-duration:${dur}s;`; d.textContent='★♦●❤✦▲◆🎵'[Math.floor(Math.random()*8)]; }else{ d.style.cssText=`width:${sz}px;height:${sz}px;background:${c2};left:${x}px;top:${y}px;border-radius:50%;--tx:${Math.cos(ang)*dist}px;--ty:${Math.sin(ang)*dist-50}px;animation-duration:${dur}s;`; } stage.appendChild(d); setTimeout(()=>d.remove(),dur*1000+100); }
  const ms=document.createElement('div'); ms.className='musym'; ms.style.cssText=`left:${x-18}px;top:${y-12}px;font-size:48px;color:${col};text-shadow:0 0 20px ${col};`; ms.textContent=MSYMS[Math.floor(Math.random()*MSYMS.length)]; stage.appendChild(ms); setTimeout(()=>ms.remove(),1700);
}
function flash(col){ const f=document.createElement('div'); f.className='flash'; f.style.background=col; stage.appendChild(f); setTimeout(()=>f.remove(),480); }

function go(key){
  const sw=stage.offsetWidth,sh=stage.offsetHeight;
  const cs=Math.min(sw,sh)*0.3;
  const x=cs/2+Math.random()*(sw-cs*2), y=cs/2+Math.random()*(sh-cs*2-60);
  const col=COLS[Math.floor(Math.random()*COLS.length)];
  const emoji=pickForKey(key);
  const isLetter = emoji.length === 1 && emoji >= 'A' && emoji <= 'Z';
  const card=document.createElement('div'); card.className='card fadeout';
  card.style.cssText=`left:${x}px;top:${y}px;background:rgba(255,255,255,0.07);border:3px solid ${col}88;width:${cs}px;height:${cs}px;`;
  card.innerHTML=`<span class="em" ${isLetter?`style="color:${col};text-shadow:0 0 40px ${col}88;"`:''}>${emoji}</span>`;
  stage.appendChild(card); setTimeout(()=>card.remove(),2200);
  burst(x+cs/2,y+cs/2,col); flash(col+'28');
  playSound(emoji,key);
}

stage.addEventListener('touchstart',e=>{
  e.preventDefault();
  // Resume AudioContext on every touch (Android may suspend it after inactivity)
  if (actx && actx.state === 'suspended') actx.resume();
  Array.from(e.changedTouches).forEach(()=>go(String.fromCharCode(65+Math.floor(Math.random()*26))));
},{passive:false});
stage.addEventListener('click',e=>{ if(e.target.closest('#sound-panel')||e.target.closest('#exit-btn')||e.target.closest('#cm-btn')||e.target.closest('#cm-modal')) return; go(String.fromCharCode(65+Math.floor(Math.random()*26))); });
stage.focus();

// ── GREETINGS — greet_N.ogg files if present, musical fanfare fallback ──────
const GREET_COUNT = 8;
// Musical fanfare — plays a happy rising arpeggio as greeting
function playGreetingFanfare() {
  const c=ctx(),n=c.currentTime,d=c.destination;
  // Bright rising arpeggio: C5 E5 G5 C6 — always cheerful
  const notes=[523.25,659.25,783.99,1046.5];
  notes.forEach((f,i)=>{
    const t=i*0.13;
    [[1,0.55,0.55,'triangle'],[2,0.12,0.28,'sine'],[3,0.05,0.18,'sine']].forEach(([r,v,dur,type])=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type=type;o.frequency.value=Math.min(f*r,6000);
      g.gain.setValueAtTime(v,n+t);g.gain.exponentialRampToValueAtTime(0.001,n+t+dur);
      o.connect(g);g.connect(d);o.start(n+t);o.stop(n+t+dur+0.05);
    });
    // Sparkle on top note
    if(i===3){
      [0,0.08,0.16].forEach((st,si)=>{
        const o2=c.createOscillator(),g2=c.createGain();
        o2.type='sine';o2.frequency.value=f*(1.5+si*0.5);
        g2.gain.setValueAtTime(0.14,n+t+st);g2.gain.exponentialRampToValueAtTime(0.001,n+t+st+0.1);
        o2.connect(g2);g2.connect(d);o2.start(n+t+st);o2.stop(n+t+st+0.12);
      });
    }
  });
}
function playGreeting() {
  const n = Math.floor(Math.random() * GREET_COUNT) + 1;
  const key = `greet_${n}`;
  const urls = SOUND_SOURCES[key] || [];
  // Try cached buffer first
  for (const url of urls) {
    if (bufCache[url]) { playBuf(bufCache[url]); return; }
  }
  // Try loading the file async, musical fanfare fallback (no TTS)
  (async () => {
    for (const url of urls) {
      try { const buf = await loadBuf(url); playBuf(buf); return; } catch(e) {}
    }
    playGreetingFanfare();
  })();
}

// ── PRELOAD all local sounds at startup so first press is instant ─────────────
function preloadSounds() {
  Object.values(SOUND_SOURCES).forEach(urls => {
    // Try each URL in order, stop at first success
    (async () => {
      for (const url of urls) {
        try { await loadBuf(url); break; } catch(e) {}
      }
    })();
  });
}
